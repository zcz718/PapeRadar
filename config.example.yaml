# start-my-week — research interests config example
#
# Copy this file to:
#   $OBSIDIAN_VAULT_PATH/99_System/Config/research_interests.yaml
# (or pass an explicit path with --config)
#
# To inspect what's currently active, run:
#   python scripts/show_keywords.py
# To edit interactively, ask the agent (Claude Code / Codex):
#   "show my research interests" / "add a keyword".
#
# This example is biology-focused (the skill's primary use case). Replace with
# your own domains and keywords — domain names are arbitrary labels.

# Output language: "en" or "zh"
language: "en"

# ─────────────────────────────────────────────────────────────────────────
# Output mode
# ─────────────────────────────────────────────────────────────────────────
# "obsidian"   — writes weekly notes + paper notes into an Obsidian vault,
#                with wikilinks ([[...]]) and image embeds. Requires vault_path.
# "standalone" — writes plain Markdown files (no wikilinks, no vault assumption)
#                into output_dir. Use this if you don't use Obsidian.
output:
  mode: "standalone"

  obsidian:
    # Required iff mode == "obsidian". Can also be set via $OBSIDIAN_VAULT_PATH
    # env var (env var wins if both are set).
    vault_path: ""
    daily_dir: "10_Daily"
    papers_dir: "20_Research/Papers"

  standalone:
    # Where plain-markdown weekly notes go. Tilde is expanded.
    output_dir: "~/start-my-week-output"

# Semantic Scholar API key (optional — reduces rate limiting)
# Free key: https://www.semanticscholar.org/product/api#api-key
# semantic_scholar_api_key: "your-api-key-here"

# Zotero sync (optional — set ZOTERO_API_KEY + ZOTERO_USER_ID env vars to enable)
# (Keys are NOT stored in this YAML; use environment variables.)

# ─────────────────────────────────────────────────────────────────────────
# Top-tier journal filter
# ─────────────────────────────────────────────────────────────────────────
# When set, PubMed and Semantic Scholar results are RESTRICTED to these
# journals. Preprints (arXiv / bioRxiv / medRxiv) are always included.
# Leave empty (or omit) to disable the filter.
# Use exact PubMed journal names or NLM abbreviations.
prioritize_journals:
  - "Nature"
  - "Science"
  - "Cell"
  - "Nature Methods"
  - "Nature Genetics"
  - "Nature Biotechnology"
  - "Nature Communications"
  - "Nature Cell Biology"
  - "Nature Structural & Molecular Biology"
  - "Cell Reports"
  - "Molecular Cell"
  - "Cell Stem Cell"
  - "eLife"
  - "Genome Research"
  - "Genome Biology"
  - "Nucleic Acids Research"
  - "Proc Natl Acad Sci U S A"     # PNAS (NLM abbreviation)
  - "Science Advances"
  - "PLoS Biology"

# ─────────────────────────────────────────────────────────────────────────
# Research domains
# ─────────────────────────────────────────────────────────────────────────
# These are EXAMPLE domains to show the structure — generic biology areas,
# not anyone's specific research. Replace them with your own topics; the
# domain names are arbitrary labels and `priority` (1–5) weights the score.
research_domains:

  "Genomics & Genome Biology":
    keywords:
      - "genome"
      - "genomics"
      - "genome assembly"
      - "structural variant"
      - "variant calling"
      - "comparative genomics"
      - "population genetics"
      - "GWAS"
    arxiv_categories:
      - "q-bio.GN"
      - "q-bio.PE"
    priority: 4

  "Gene Regulation & Epigenetics":
    keywords:
      - "transcription factor"
      - "enhancer"
      - "promoter"
      - "chromatin accessibility"
      - "DNA methylation"
      - "histone modification"
      - "ATAC-seq"
      - "ChIP-seq"
      - "gene regulation"
    arxiv_categories:
      - "q-bio.GN"
      - "q-bio.MN"
    priority: 4

  "Single-cell Biology":
    keywords:
      - "single-cell"
      - "scRNA-seq"
      - "single-nucleus"
      - "spatial transcriptomics"
      - "cell atlas"
      - "cell type"
      - "trajectory inference"
    arxiv_categories:
      - "q-bio.GN"
      - "q-bio.QM"
      - "q-bio.CB"
    priority: 3

  "Computational Biology & Methods":
    keywords:
      - "differential expression"
      - "sequence alignment"
      - "bioinformatics pipeline"
      - "benchmark"
      - "statistical model"
      - "read mapping"
      - "quality control"
    arxiv_categories:
      - "q-bio.QM"
      - "q-bio.GN"
    priority: 3

  "Machine Learning for Biology":
    keywords:
      - "deep learning"
      - "foundation model"
      - "sequence model"
      - "protein structure prediction"
      - "representation learning"
      - "sequence-to-function"
    arxiv_categories:
      - "cs.LG"
      - "q-bio.GN"
      - "q-bio.QM"
    priority: 2

# Excluded keywords — papers whose title/abstract contain any of these are filtered out
excluded_keywords:
  - "workshop"
  - "review"    # removes review articles; delete this line if you want reviews included
  - "survey"    # removes survey papers; same note

# Optional: extra words to skip during automatic wikilink keyword linking
# extra_common_words:
#   - "dataset"
#   - "results"
